<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LicitaAI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>LicitaAI</h1>

    <a href="/editais/novo"
       class="btn btn-success mb-3">
        Novo Edital
    </a>

    <table class="table table-striped">

        <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Órgão</th>
            <th>Data Limite</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="edital : ${editais}">

            <td th:text="${edital.id}"></td>
            <td th:text="${edital.titulo}"></td>
            <td th:text="${edital.orgao}"></td>
            <td th:text="${edital.dataLimite}"></td>

            <td> 
                <a th:href="@{/editais/{id}(id=${edital.id})}"
                   class="btn btn-primary btn-sm">
                    Ver
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
