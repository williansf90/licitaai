<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Novo Edital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Novo Edital</h1>

    <form th:action="@{/editais}" th:object="${edital}" method="post">

        <div class="mb-3">
            <label>Título</label>
            <input type="text"
                   class="form-control"
                   th:field="*{titulo}">
        </div>

        <div class="mb-3">
            <label>Órgão</label>
            <input type="text"
                   class="form-control"
                   th:field="*{orgao}">
        </div>

        <div class="mb-3">
            <label>Data Limite</label>
            <input type="date"
                   class="form-control"
                   th:field="*{dataLimite}">
        </div>

        <div class="mb-3">
            <label>Texto do Edital</label>

            <textarea
                class="form-control"
                rows="8"
                th:field="*{texto}">
            </textarea>
        </div>

        <button class="btn btn-primary">
            Salvar
        </button>

    </form>

</div>

</body>
</html>
