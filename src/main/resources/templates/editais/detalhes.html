<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Detalhes do Edital</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h1 th:text="${edital.titulo}"></h1>

    <hr>

    <p>
        <strong>Órgão:</strong>
        <span th:text="${edital.orgao}"></span>
    </p>

    <p>
        <strong>Prazo:</strong>
        <span th:text="${edital.dataLimite}"></span>
    </p>

    <h4>Texto do Edital</h4>

    <div class="border p-3">
        <span th:text="${edital.texto}"></span>
    </div>

    <form th:action="@{/editais/analisar/{id}(id=${edital.id})}"
      method="post">

    <button class="btn btn-success mt-3">
        Analisar com IA
    </button>

    <div th:if="${edital.resumo != null}"
     class="mt-4">

    <h3>Resumo Gerado pela IA</h3>

    <div class="alert alert-info"
         th:text="${edital.resumo}">
    </div>

    <h3>Principais Requisitos</h3>

    <div class="alert alert-warning"
         th:text="${edital.requisitos}">
    </div>

</div>

</form>

</div>

</body>
</html>
