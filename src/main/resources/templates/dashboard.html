<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LicitaAI Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            LicitaAI
        </span>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm border-primary">
                <div class="card-body text-center">
                    <h6>Total de Editais</h6>
                    <h1 th:text="${totalEditais}"></h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-success">
                <div class="card-body text-center">
                    <h6>Editais Analisados</h6>
                    <h1 th:text="${analisados}"></h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm border-warning">
                <div class="card-body text-center">
                    <h6>Pendentes</h6>
                    <h1 th:text="${pendentes}"></h1>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-4">

        <a href="/editais" class="btn btn-primary">
            Ver Editais
        </a>

        <a href="/editais/novo" class="btn btn-success">
            Novo Edital
        </a>

    </div>

    <div class="card shadow-sm mt-5">

        <div class="card-header">
            Últimos Editais
        </div>

        <div class="card-body">

            <table class="table table-hover">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Órgão</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="edital : ${ultimosEditais}">

                    <td th:text="${edital.id}"></td>

                    <td th:text="${edital.titulo}"></td>

                    <td th:text="${edital.orgao}"></td>

                    <td>

                        <span th:if="${edital.resumo != null}"
                              class="badge bg-success">
                            Analisado
                        </span>

                        <span th:if="${edital.resumo == null}"
                              class="badge bg-warning text-dark">
                            Pendente
                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
